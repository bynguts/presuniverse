<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PresUniverse — Virtual Campus Tour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400&family=Outfit:wght@200;300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.2/css/all.min.css" crossorigin="anonymous" referrerpolicy="no-referrer">
  <style>
    :root {
      --crimson:   #c8202e;
      --crimson-h: #a01820;
      --cobalt-m:  #2451cc;
      --cobalt-l:  #7baaf7;
      --bg:        #04060f;
      --white:     #eef0f8;
      --white-2:   #8a93b0;
      --white-3:   #3d4563;
      --border:    rgba(255,255,255,.07);
      --border-hi: rgba(255,255,255,.16);
      --fd: 'Cormorant Garamond', Georgia, serif;
      --fb: 'Outfit', system-ui, sans-serif;
      --ease: cubic-bezier(.22,1,.36,1);
    }
    *, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
    html, body { width:100%; height:100%; overflow:hidden; background:var(--bg); }
    body { font-family:var(--fb); -webkit-font-smoothing:antialiased; }

    /* ── NAVBAR ── */
    #nav {
      position:fixed; top:0; left:0; right:0; z-index:300;
      display:flex; align-items:center; justify-content:space-between;
      padding:0 5%; height:68px;
      background:rgba(4,6,15,.88);
      backdrop-filter:blur(24px) saturate(180%);
      -webkit-backdrop-filter:blur(24px) saturate(180%);
      border-bottom:1px solid var(--border);
    }
    .logo { font-family:var(--fd); font-size:1.65rem; font-weight:700; text-decoration:none; line-height:1; letter-spacing:-.2px; }
    .logo .p { color:var(--crimson); }
    .logo .u { color:var(--cobalt-m); }
    .nav-tour {
      display:inline-flex; align-items:center; gap:6px;
      padding:9px 22px;
      background:var(--crimson); color:#fff;
      font-size:.7rem; font-weight:700; letter-spacing:2px; text-transform:uppercase;
      text-decoration:none; border-radius:4px;
      box-shadow:0 4px 18px rgba(200,32,46,.3);
      transition:background .25s, transform .2s, box-shadow .25s;
    }
    .nav-tour:hover { background:var(--crimson-h); transform:translateY(-1px); box-shadow:0 8px 28px rgba(200,32,46,.48); }

    /* ── LAYOUT ── */
    #layout {
      position:fixed; inset:0; top:68px;
      display:grid;
      grid-template-columns: 40% 60%;
    }

    /* ── LEFT PANEL ── */
    #left-panel {
      position:relative; z-index:10;
      display:flex; flex-direction:column; justify-content:center;
      padding:0 5% 0 6%;
      background:linear-gradient(to right, rgba(4,6,15,1) 65%, transparent 100%);
    }

    .eyebrow {
      display:inline-flex; align-items:center; gap:12px;
      margin-bottom:1.8rem;
      opacity:0; animation:riseUp .8s var(--ease) .1s forwards;
    }
    .ey-rule { width:26px; height:1px; background:var(--crimson); flex-shrink:0; }
    .ey-txt  { font-size:.64rem; font-weight:500; letter-spacing:3.5px; text-transform:uppercase; color:var(--white-2); }
    .ey-pill {
      padding:2px 10px; border:1px solid rgba(200,32,46,.35); border-radius:20px;
      background:rgba(200,32,46,.1); color:var(--crimson);
      font-size:.57rem; font-weight:700; letter-spacing:1.5px; text-transform:uppercase;
    }

    /* Animated building name */
    #bld-name {
      font-family:var(--fd);
      font-size:clamp(1.4rem,2.2vw,2rem);
      font-weight:400; color:var(--white-2);
      letter-spacing:.5px; line-height:1;
      margin-bottom:.8rem;
      display:block;
      transition:opacity .4s var(--ease), transform .4s var(--ease);
    }

    .hero-title {
      font-family:var(--fd);
      font-size:clamp(3.4rem,5.5vw,5.4rem);
      font-weight:700; line-height:.96; letter-spacing:-.5px;
      margin-bottom:1.4rem;
      opacity:0; animation:riseUp .8s var(--ease) .25s forwards;
    }
    .t-white { display:block; color:var(--white); }
    .t-red   { display:block; color:var(--crimson); }
    .t-blue  { display:block; color:var(--cobalt-l); font-style:italic; font-weight:300; }

    .hero-sub {
      font-size:.9rem; font-weight:300; color:var(--white-2);
      line-height:1.75; margin-bottom:2.2rem; max-width:360px;
      opacity:0; animation:riseUp .8s var(--ease) .4s forwards;
    }

    /* Controls */
    #ctrl-row {
      display:flex; align-items:center; gap:1.2rem;
      opacity:0; animation:riseUp .8s var(--ease) .55s forwards;
    }
    .nav-arr {
      width:44px; height:44px; border-radius:50%;
      border:1px solid var(--border-hi);
      background:rgba(255,255,255,.04);
      color:var(--white); font-size:1.1rem;
      cursor:pointer; display:flex; align-items:center; justify-content:center;
      transition:all .25s var(--ease);
    }
    .nav-arr:hover { background:var(--crimson); border-color:var(--crimson); box-shadow:0 4px 18px rgba(200,32,46,.4); }
    .nav-arr i { pointer-events:none; }
    #sdots { display:flex; gap:8px; align-items:center; }
    .sdot {
      width:6px; height:6px; border-radius:50%;
      background:var(--white-3); cursor:pointer;
      transition:all .3s var(--ease);
    }
    .sdot.on { background:var(--crimson); width:24px; border-radius:3px; }
    .s-count {
      font-family:var(--fd); margin-left:auto;
      color:var(--white-3); letter-spacing:1px;
    }
    .s-count .c { color:var(--white-2); font-size:1.4rem; font-weight:600; }

    /* Hotspot tap hint */
    .hs-hint {
      display:inline-flex; align-items:center; gap:8px;
      margin-top:1.8rem;
      opacity:0; animation:fadeIn 1s var(--ease) 1.1s forwards;
    }
    .hs-hint-dot {
      width:8px; height:8px; border-radius:50%; background:var(--crimson);
      animation:hsPulse 1.8s ease-in-out infinite;
      flex-shrink:0;
    }
    @keyframes hsPulse {
      0%,100% { box-shadow:0 0 0 0 rgba(200,32,46,.65); }
      60%      { box-shadow:0 0 0 8px rgba(200,32,46,0); }
    }
    .hs-hint span { font-size:.62rem; font-weight:500; letter-spacing:2px; text-transform:uppercase; color:var(--white-3); }

    /* ── RIGHT: Slides ── */
    #right-panel { position:relative; overflow:hidden; }

    .slide {
      position:absolute; inset:0;
      opacity:0;
      transition:opacity .65s var(--ease);
      pointer-events:none;
    }
    .slide.active { opacity:1; pointer-events:all; }

    .s-img-wrap { position:relative; width:100%; height:100%; }

    .s-img {
      width:100%; height:100%;
      object-fit:cover;
      object-position:left center;
      display:block;
      filter:brightness(.9) contrast(1.04) saturate(.88);
      transition:filter .8s;
    }
    .slide.active .s-img { transform:scale(var(--img-zoom,1.04)) translateX(0px); }
    .slide:not(.active) .s-img { transform:scale(var(--img-zoom,1.04)) translateX(0px); }

    /* Gradient blend with left panel */
    .s-img-wrap::before {
      content:''; position:absolute; inset:0; z-index:1; pointer-events:none;
      background:
        linear-gradient(to right, rgba(4,6,15,1) 0%, rgba(4,6,15,.55) 15%, transparent 38%),
        linear-gradient(to top,   rgba(4,6,15,.6) 0%, transparent 28%),
        linear-gradient(to bottom,rgba(4,6,15,.45) 0%, transparent 18%);
    }

    /* ── HOTSPOTS ── */
    .hs-layer { position:absolute; inset:0; z-index:5; }

    .hs {
      position:absolute; transform:translate(-50%,-50%);
      cursor:pointer; transition:all .3s var(--ease);
    }
    .hs-ring {
      position:relative; width:52px; height:52px;
      display:flex; align-items:center; justify-content:center;
    }
    .hs-ring::before {
      content:''; position:absolute; inset:0; border-radius:50%;
      border:1.5px solid rgba(200,32,46,.5);
      animation:hsRing 2.4s ease-in-out infinite;
    }
    .hs-ring::after {
      content:''; position:absolute; inset:-11px; border-radius:50%;
      border:1px solid rgba(200,32,46,.18);
      animation:hsRing 2.4s ease-in-out .6s infinite;
    }
    @keyframes hsRing {
      0%,100% { transform:scale(.88); opacity:.9; }
      50%      { transform:scale(1.2); opacity:.22; }
    }
    .hs-dot {
      width:11px; height:11px; border-radius:50%;
      background:var(--crimson);
      box-shadow:0 0 0 3px rgba(200,32,46,.22), 0 0 18px rgba(200,32,46,.55);
      position:relative; z-index:1;
      transition:transform .3s var(--ease), box-shadow .3s;
    }
    .hs:hover .hs-dot {
      transform:scale(1.6);
      box-shadow:0 0 0 5px rgba(200,32,46,.28), 0 0 28px rgba(200,32,46,.8);
    }

    /* Tooltip */
    .hs-tip {
      position:absolute;
      bottom:calc(100% + 14px); left:50%;
      transform:translateX(-50%) translateY(6px);
      white-space:nowrap;
      background:rgba(4,6,15,.95);
      backdrop-filter:blur(20px);
      border:1px solid var(--border-hi);
      border-radius:10px;
      padding:10px 16px;
      pointer-events:none;
      opacity:0;
      transition:opacity .22s var(--ease), transform .22s var(--ease);
      z-index:20;
    }
    .hs:hover .hs-tip { opacity:1; transform:translateX(-50%) translateY(0); }
    .tip-tag  { font-size:.59rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--crimson); display:block; margin-bottom:3px; }
    .tip-name { font-family:var(--fd); font-size:1.1rem; font-weight:600; color:var(--white); display:block; }
    .tip-sub  { font-size:.65rem; font-weight:300; color:var(--white-2); display:block; margin-top:1px; }
    .hs-tip::after {
      content:''; position:absolute; top:100%; left:50%; transform:translateX(-50%);
      border:6px solid transparent; border-top-color:var(--border-hi);
    }
    /* Tooltip below variant */
    .hs.tb .hs-tip {
      bottom:auto; top:calc(100% + 14px);
      transform:translateX(-50%) translateY(-6px);
    }
    .hs.tb:hover .hs-tip { transform:translateX(-50%) translateY(0); }
    .hs.tb .hs-tip::after { top:auto; bottom:100%; border-top-color:transparent; border-bottom-color:var(--border-hi); }

    /* ── VERTICAL COUNTER ── */
    #v-count {
      position:fixed; right:26px; top:50%; transform:translateY(-50%);
      z-index:20;
      display:flex; flex-direction:column; align-items:center; gap:12px;
      opacity:0; animation:fadeIn .8s var(--ease) 1.3s forwards;
    }
    .vc-line  { width:1px; height:44px; background:linear-gradient(to bottom, transparent, var(--white-3)); }
    .vc-line2 { width:1px; height:44px; background:linear-gradient(to bottom, var(--white-3), transparent); }
    .vc-num   { font-family:var(--fd); font-size:1.9rem; font-weight:700; color:var(--white-2); line-height:1; letter-spacing:-1px; }
    .vc-lbl   { font-size:.52rem; font-weight:600; letter-spacing:2.5px; text-transform:uppercase; color:var(--white-3); writing-mode:vertical-rl; }

    /* ── TRANSITION ── */
    #ov { position:fixed; inset:0; z-index:999; background:var(--bg); opacity:0; pointer-events:none; transition:opacity .44s ease; }
    #ov.on { opacity:1; pointer-events:all; }

    /* ── SWIPE HINT ARROWS (edges) ── */
    .edge-arr {
      position:fixed; top:50%; z-index:50;
      transform:translateY(-50%);
      width:36px; height:60px;
      display:flex; align-items:center; justify-content:center;
      color:var(--white-3); font-size:1.2rem;
      cursor:pointer;
      transition:color .25s;
      opacity:0; animation:fadeIn .8s var(--ease) 1.5s forwards;
    }
    .edge-arr:hover { color:var(--white); }
    .edge-arr i { pointer-events:none; }
    #ea-l { left:42%; }
    #ea-r { right:1%; }

    /* ── ANIMATIONS ── */
    @keyframes riseUp { from{opacity:0;transform:translateY(26px)} to{opacity:1;transform:translateY(0)} }
    @keyframes fadeIn  { from{opacity:0} to{opacity:1} }

    /* ── RESPONSIVE ── */
    @media(max-width:900px) {
      #layout { grid-template-columns:1fr; }
      #left-panel {
        position:absolute; bottom:0; left:0; right:0; z-index:20;
        background:linear-gradient(to top, rgba(4,6,15,.97) 55%, transparent 100%);
        padding:1.5rem 5% 2rem;
        justify-content:flex-end;
      }
      #right-panel { position:absolute; inset:0; }
      #v-count, #ea-l, #ea-r { display:none; }
    }
  </style>
</head>
<body>
<div id="ov"></div>

<!-- NAVBAR -->
<nav id="nav">
  <a href="index.html" class="logo"><span class="p">Pres</span><span class="u">Universe</span></a>
  <a href="tour.html" class="nav-tour">Enter Tour <i class="fa-solid fa-arrow-right" aria-hidden="true"></i></a>
</nav>

<!-- LAYOUT -->
<div id="layout">

  <!-- LEFT -->
  <div id="left-panel">
    <div class="eyebrow">
      <span class="ey-rule"></span>
      <span class="ey-txt">President University · Cikarang</span>
      <span class="ey-pill">360° Virtual Tour</span>
    </div>

    <span id="bld-name">Main Building</span>

    <h1 class="hero-title">
      <span class="t-white">WELCOME TO THE MOST</span>
      <span class="t-red">INTERNATIONAL UNIVERSITY</span>
      <span class="t-blue">IN INDONESIA</span>
    </h1>

    <p class="hero-sub">Tap any hotspot on the building to step inside its 360° view — no download required.</p>

    <div id="ctrl-row">
      <button class="nav-arr" onclick="prevSlide()"><i class="fa-solid fa-arrow-left" aria-hidden="true"></i></button>
      <div id="sdots"></div>
      <button class="nav-arr" onclick="nextSlide()"><i class="fa-solid fa-arrow-right" aria-hidden="true"></i></button>
      <span class="s-count"><span class="c" id="cur">1</span> / <span id="tot">3</span></span>
    </div>

    <div class="hs-hint">
      <div class="hs-hint-dot"></div>
      <span>Tap a hotspot to explore</span>
    </div>
  </div>

  <!-- RIGHT -->
  <div id="right-panel"></div>
</div>

<!-- Vertical counter -->
<div id="v-count">
  <div class="vc-line"></div>
  <div class="vc-num" id="vc-num">01</div>
  <div class="vc-lbl">Building</div>
  <div class="vc-line2"></div>
</div>

<!-- Edge arrows -->
<div class="edge-arr" id="ea-l" onclick="prevSlide()"><i class="fa-solid fa-chevron-left" aria-hidden="true"></i></div>
<div class="edge-arr" id="ea-r" onclick="nextSlide()"><i class="fa-solid fa-chevron-right" aria-hidden="true"></i></div>

/* ═══════════ RENDER ═══════════ */
let cur = 0;
const rp    = document.getElementById('right-panel');
const sdots = document.getElementById('sdots');
document.getElementById('tot').textContent = BUILDINGS.length;

BUILDINGS.forEach((b, bi) => {
  /* Slide */
  const slide = document.createElement('div');
  slide.className = 'slide' + (bi===0?' active':'');
  slide.id = 's'+bi;

  const wrap = document.createElement('div');
  wrap.className = 's-img-wrap';

  const img = document.createElement('img');
  img.className = 's-img';
  img.src = b.img;
  img.alt = b.name;
  const zoom = 1.3;
  img.style.setProperty('--img-zoom', String(zoom));
  img.dataset.zoom = String(zoom);
  wrap.appendChild(img);

  /* Hotspot layer */
  const hl = document.createElement('div');
  hl.className = 'hs-layer';

  b.hotspots.forEach(h => {
    const el = document.createElement('div');
    el.className = 'hs' + (h.tb?' tb':'');
    el.style.top  = h.top;
    el.style.left = h.left;
    el.onclick = () => goTo(h.loc, h.url);
    el.innerHTML = `
      <div class="hs-ring"><div class="hs-dot"></div></div>
      <div class="hs-tip">
        <span class="tip-tag">${h.tag}</span>
        <span class="tip-name">${h.name}</span>
        <span class="tip-sub">${h.sub}</span>
      </div>`;
    hl.appendChild(el);
  });

  wrap.appendChild(hl);
  slide.appendChild(wrap);
  rp.appendChild(slide);

  /* Dot */
  const dot = document.createElement('div');
  dot.className = 'sdot'+(bi===0?' on':'');
  dot.onclick = () => goSlide(bi);
  sdots.appendChild(dot);
});

/* Update initial state */
updateUI();

/* ═══════════ SLIDE LOGIC ═══════════ */
function goSlide(n) {
  if (n===cur) return;
  document.getElementById('s'+cur).classList.remove('active');
  cur = ((n % BUILDINGS.length) + BUILDINGS.length) % BUILDINGS.length;
  document.getElementById('s'+cur).classList.add('active');
  updateUI();
}
function nextSlide() { goSlide(cur+1); }
function prevSlide() { goSlide(cur-1); }

function updateUI() {
  /* dots */
  document.querySelectorAll('.sdot').forEach((d,i) => d.classList.toggle('on', i===cur));
  /* counter */
  document.getElementById('cur').textContent = cur+1;
  document.getElementById('vc-num').textContent = (cur+1<10?'0':'')+(cur+1);
  /* name animate */
  const nm = document.getElementById('bld-name');
  nm.style.opacity='0'; nm.style.transform='translateY(-10px)';
  setTimeout(() => {
    nm.textContent = BUILDINGS[cur].name;
    nm.style.transition='opacity .38s var(--ease),transform .38s var(--ease)';
    nm.style.opacity='1'; nm.style.transform='translateY(0)';
  }, 220);
}

/* Keyboard */
document.addEventListener('keydown', e => {
  if (e.key==='ArrowRight') nextSlide();
  if (e.key==='ArrowLeft')  prevSlide();
});

/* Touch/swipe */
let tx=0;
document.addEventListener('touchstart', e=>{ tx=e.touches[0].clientX; }, {passive:true});
document.addEventListener('touchend',   e=>{
  const dx = e.changedTouches[0].clientX - tx;
  if (Math.abs(dx)>50) dx<0 ? nextSlide() : prevSlide();
}, {passive:true});

/* Keep building images static (no parallax movement) */

/* Go to tour */
function goTo(locName, src) {
  document.getElementById('ov').classList.add('on');
  sessionStorage.setItem('presuniv_goto_name', locName);
